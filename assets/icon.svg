<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256" role="img" aria-label="WSA Website Accelerator">
  <title>WSA — Website Accelerator</title>
  <defs>
    <linearGradient id="wsa-arc" gradientUnits="userSpaceOnUse" x1="11.22" y1="48" x2="52.78" y2="48">
      <stop offset="0" stop-color="#1A1D24"/>
      <stop offset="0.45" stop-color="#2C3038"/>
      <stop offset="1" stop-color="#EB6945"/>
    </linearGradient>
    <linearGradient id="wsa-upper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB395"/>
      <stop offset="1" stop-color="#F89072"/>
    </linearGradient>
    <linearGradient id="wsa-lower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C8512F"/>
      <stop offset="1" stop-color="#9F3E1F"/>
    </linearGradient>
    <filter id="wsa-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1"/>
      <feOffset dx="0" dy="1.6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.38"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M 11.22 48 A 24 24 0 1 1 52.78 48" fill="none" stroke="url(#wsa-arc)" stroke-width="5" stroke-linecap="round"/>

  <g stroke="rgba(26,29,36,0.28)" stroke-width="1.6" stroke-linecap="round">
    <line x1="17.00" y1="36.00" x2="12.00" y2="36.00"/>
    <line x1="21.39" y1="25.39" x2="17.86" y2="21.86"/>
    <line x1="32.00" y1="21.00" x2="32.00" y2="16.00"/>
    <line x1="42.61" y1="25.39" x2="46.14" y2="21.86"/>
    <line x1="47.00" y1="36.00" x2="52.00" y2="36.00"/>
  </g>

  <g opacity="0.10">
    <path d="M 45 36 L 11 50 L 20 36 Z" fill="#C8512F"/>
    <path d="M 45 36 L 11 22 L 20 36 Z" fill="#F89072"/>
  </g>
  <g opacity="0.20">
    <path d="M 49 36 L 15 50 L 24 36 Z" fill="#C8512F"/>
    <path d="M 49 36 L 15 22 L 24 36 Z" fill="#F89072"/>
  </g>
  <g opacity="0.35">
    <path d="M 52 36 L 18 50 L 27 36 Z" fill="#C8512F"/>
    <path d="M 52 36 L 18 22 L 27 36 Z" fill="#F89072"/>
  </g>

  <ellipse cx="36" cy="55.5" rx="17" ry="1.8" fill="#1A1D24" opacity="0.22"/>

  <g filter="url(#wsa-shadow)">
    <path d="M 55 36 L 21 50 L 30 36 Z" fill="url(#wsa-lower)"/>
    <path d="M 55 36 L 21 22 L 30 36 Z" fill="url(#wsa-upper)"/>
    <line x1="30" y1="36" x2="55" y2="36" stroke="rgba(0,0,0,0.18)" stroke-width="0.5" stroke-linecap="round"/>
  </g>
</svg>
